# Root wrangler.toml — used for Cloudflare Pages binding config
# The Worker is configured in backend/wrangler.toml
# Deploy the worker from the backend/ directory: cd backend && wrangler deploy
# Deploy the frontend Pages from root: wrangler pages deploy frontend/dist

name = "portfolio-worker"
main = "backend/src/index.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "portfolio-db"
database_id = "e952067b-974f-446b-bb29-a356904ac16a"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "portfolio-assets"

[vars]
ENVIRONMENT = "production"
